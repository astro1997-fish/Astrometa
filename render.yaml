services:
  - type: web
    name: astro-meta-trade-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add these in the Render dashboard → Environment:
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SESSION_SECRET,
      # BTC_XPUB, ETH_RPC_URL, CONTRACT_ADDRESS (optional),
      # FRONTEND_URL (your Netlify URL, e.g. https://astro-meta-trade.netlify.app)
